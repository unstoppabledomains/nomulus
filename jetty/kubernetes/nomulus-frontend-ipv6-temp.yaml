# Temporary IPv6-only EPP Service
# This service uses container-native load balancing (GCE_VM_IP_PORT NEGs)
# which supports IPv6 but does NOT preserve source IP addresses.
# 
# WARNING: This is a temporary workaround. Source IP will be lost for IPv6 connections.
# Keep the existing EPP service for IPv4 with source IP preservation.
#
# IMPORTANT: Requires a new IPv6 address in Terraform
# This service uses "EPP-ipv6-ud-temp" which must be provisioned in Terraform first.
# Add this to your Terraform configuration (e.g., networking/loadbalancer.tf):
#
#   resource "google_compute_address" "epp_ipv6_ud_temp" {
#     name            = "epp-ipv6-ud-temp"
#     address_type    = "EXTERNAL"
#     ip_version      = "IPV6"
#     ipv6_endpoint_type = "NETLB"
#     region          = var.region  # or "us-central1"
#     subnetwork      = "projects/${var.project_id}/regions/${var.region}/subnetworks/${var.subnetwork_name}"
#   }
#
# After provisioning, update DNS AAAA record to point to the new IPv6 address.
#
# This service is NOT automatically deployed by deploy-nomulus-for-env.sh
# To deploy manually, use the same sed replacements as the main deploy script:
#   sed s/GCP_PROJECT/"${project}"/g "./kubernetes/nomulus-frontend-ipv6-temp.yaml" | \
#     sed s/ENVIRONMENT/"${environment}"/g | \
#     sed s/PROXY_ENV/"${environment}"/g | \
#     sed s/EPP/"epp"/g | \
#     kubectl apply -f -

apiVersion: v1
kind: Service
metadata:
  name: EPP-ipv6-temp
  annotations:
    # Use container-native load balancing (creates GCE_VM_IP_PORT NEGs)
    cloud.google.com/neg: '{"exposed_ports": {"700":{}}}'
    # Use the new IPv6 address (EPP placeholder will be replaced to epp)
    # This address must be provisioned in Terraform first (see comments above)
    networking.gke.io/load-balancer-ip-addresses: "EPP-ipv6-ud-temp"
spec:
  type: LoadBalancer
  # Note: externalTrafficPolicy: Local may not preserve source IP with pod-level routing
  # Setting to Cluster to ensure it works (definitely loses source IP)
  externalTrafficPolicy: Cluster
  # IPv6 only
  ipFamilies: [IPv6]
  ipFamilyPolicy: SingleStack
  selector:
    service: frontend
  ports:
  - port: 700
    targetPort: epp
    name: epp
